name: Build and Publish Planck

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            asset: planck-macos-arm64
          - os: macos-15-intel
            asset: planck-macos-x64
          - os: ubuntu-22.04
            asset: planck-linux-x64
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      # ClojureScript 1.12.145 pulls closure-compiler v20250820 which is Java 21 bytecode.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install Clojure
        uses: DeLaGuardo/setup-clojure@12.5
        with:
          cli: latest

      - name: Install macOS deps
        if: runner.os == 'macOS'
        run: brew install icu4c libzip

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libjavascriptcoregtk-4.0 libglib2.0-dev libzip-dev libcurl4-gnutls-dev libicu-dev unzip

      - name: Build Planck
        run: script/build --fast

      # Network-free smoke test: the full suite hits a dead external echo server.
      - name: Smoke test
        run: |
          out=$(planck-c/build/planck -e '(println (+ 1 2))')
          test "$out" = "3" || { echo "unexpected output: $out"; exit 1; }
          planck-c/build/planck -e "(require 'planck.closure)"

      - name: Stage asset
        run: |
          mkdir -p dist
          cp planck-c/build/planck "dist/${{ matrix.asset }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${{ github.ref_name }}" dist/* --repo "${{ github.repository }}" --title "${{ github.ref_name }}" --notes "Automated build" --clobber
